spring.application.name=heal-lots-api
# Server
server.port=8080

# Supabase / PostgreSQL
spring.datasource.url=jdbc:postgresql://db.YOUR_PROJECT_REF.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Wasspord123*
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS (allow React frontend)
spring.web.cors.allowed-origins=http://localhost:3000

# JWT Secret (use a long random string)
jwt.secret=your-very-secret-key-change-this-in-production
jwt.expiration=86400000
